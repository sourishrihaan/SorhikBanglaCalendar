<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FF6B35">
    <title>সঠিক বাংলা ক্যালেন্ডার ও পঞ্জিকা</title>
    <link href="https://fonts.googleapis.com/css2?family=Kalpurush:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-variant-numeric: lining-nums tabular-nums;
        }

        :root {
            --primary: #FF6B35;
            --primary-light: #FF8555;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        html, body {
            height: 100%;
            font-family: 'Kalpurush', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #020617 100%);
            color: var(--text-primary);
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            padding: 24px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-text h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .logo-text p {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.9;
        }

        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 20px 200px;
        }

        .card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .text-body {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .api-status {
            padding: 12px;
            margin-bottom: 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .api-status.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .api-status.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid var(--error);
        }

        .api-status.loading {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-top: 20px;
        }

        .calendar-day-header {
            text-align: center;
            font-weight: 700;
            font-size: 12px;
            padding: 12px 8px;
            color: var(--primary);
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(71, 85, 105, 0.2);
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 4px;
            text-align: center;
            font-size: 11px;
        }

        .calendar-day.today {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }

        .panchang-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .panchang-item {
            background: rgba(71, 85, 105, 0.2);
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid var(--primary);
        }

        .panchang-label {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
        }

        .panchang-value {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 700;
            margin-top: 4px;
        }

        .nav-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-top: 1px solid rgba(71, 85, 105, 0.3);
            z-index: 99;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 12px 0;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-top: 3px solid transparent;
            font-size: 12px;
            font-weight: 600;
        }

        .nav-item.active {
            color: var(--primary);
            border-top-color: var(--primary);
        }

        .loading-spinner {
            border: 4px solid rgba(255, 107, 53, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-logo">
            <div style="font-size: 32px;">🌙</div>
            <div class="logo-text">
                <h1>সঠিক বাংলা</h1>
                <p>ক্যালেন্ডার ও পঞ্জিকা</p>
            </div>
        </div>
    </header>

    <div class="main">
        <div class="card">
            <div id="apiStatus" class="api-status loading">📡 VedicAstroAPI এর সাথে সংযোগ করছি...</div>
            
            <h2 class="h2">আজকের তারিখ</h2>
            <div id="todayDate" style="font-size: 28px; color: var(--primary); margin: 16px 0;">
                <div class="loading-spinner"></div>
            </div>

            <h2 class="h2" style="margin-top: 32px;">📅 ক্যালেন্ডার</h2>
            <div id="calendarContainer">
                <div class="loading-spinner"></div>
            </div>

            <h2 class="h2" style="margin-top: 32px;">🌙 পঞ্জিকা</h2>
            <div id="panchangContainer">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <nav class="nav-bottom">
        <button class="nav-item active" onclick="alert('হোম পেজ')">
            <div>🏠</div>
            <div>হোম</div>
        </button>
        <button class="nav-item" onclick="alert('ক্যালেন্ডার')">
            <div>📅</div>
            <div>ক্যালেন্ডার</div>
        </button>
        <button class="nav-item" onclick="alert('রাশিফল')">
            <div>🔮</div>
            <div>রাশিফল</div>
        </button>
        <button class="nav-item" onclick="alert('মুহূর্ত')">
            <div>🎊</div>
            <div>মুহূর্ত</div>
        </button>
        <button class="nav-item" onclick="alert('পছন্দের')">
            <div>⭐</div>
            <div>পছন্দের</div>
        </button>
        <button class="nav-item" onclick="alert('সেটিংস')">
            <div>⚙️</div>
            <div>সেটিংস</div>
        </button>
    </nav>

    <script>
        // Bengali month and day names
        const bengaliMonths = [
            'পৌষ', 'মাঘ', 'ফাল্গুন', 'চৈত্র',
            'বৈশাখ', 'জ্যৈষ্ঠ', 'আষাঢ়', 'শ্রাবণ',
            'ভাদ্র', 'আশ্বিন', 'কার্তিক', 'মার্গশীর্ষ'
        ];

        const bengaliDays = ['রবি', 'সোম', 'মঙ্গল', 'বুধ', 'বৃহ', 'শুক্র', 'শনি'];

        // Call VedicAstroAPI via Netlify Function
        async function callVedicAstroAPI() {
            try {
                const today = new Date();
                const dateStr = today.toISOString().split('T')[0];

                console.log('Calling VedicAstroAPI for date:', dateStr);

                const response = await fetch('/.netlify/functions/vedicastro-panchang', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        date: dateStr,
                        latitude: 22.5726,
                        longitude: 88.3639,
                        timezone: 'Asia/Kolkata'
                    })
                });

                console.log('Response status:', response.status);

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                console.log('Panchang data received:', data);

                updateAPIStatus('✅ সংযুক্ত - রিয়েল ডেটা লোড হচ্ছে', 'success');
                displayPanchang(data);
                return data;
            } catch (error) {
                console.error('VedicAstroAPI Error:', error);
                updateAPIStatus('⚠️ সংযোগ ব্যর্থ - Demo মোড', 'error');
                return null;
            }
        }

        function updateAPIStatus(message, status) {
            const statusEl = document.getElementById('apiStatus');
            statusEl.textContent = message;
            statusEl.className = `api-status ${status}`;
        }

        // Display today's date
        function displayTodayDate() {
            const today = new Date();
            const dayName = bengaliDays[today.getDay()];
            const monthName = bengaliMonths[today.getMonth()];
            const date = today.getDate();
            const year = '१433';
            
            const dateEl = document.getElementById('todayDate');
            dateEl.innerHTML = `${dayName}, ${monthName} ${date}, ${year}`;
        }

        // Display panchang information
        function displayPanchang(data) {
            const container = document.getElementById('panchangContainer');
            
            if (!data) {
                container.innerHTML = '<p>পঞ্জিকা ডেটা পাওয়া যায়নি</p>';
                return;
            }

            let html = '<div class="panchang-info">';

            // Tithi
            if (data.tithi) {
                html += `
                    <div class="panchang-item">
                        <div class="panchang-label">तिथि</div>
                        <div class="panchang-value">${data.tithi || 'N/A'}</div>
                    </div>
                `;
            }

            // Nakshatra
            if (data.nakshatra) {
                html += `
                    <div class="panchang-item">
                        <div class="panchang-label">नक्षत्र</div>
                        <div class="panchang-value">${data.nakshatra || 'N/A'}</div>
                    </div>
                `;
            }

            // Yoga
            if (data.yoga) {
                html += `
                    <div class="panchang-item">
                        <div class="panchang-label">योग</div>
                        <div class="panchang-value">${data.yoga || 'N/A'}</div>
                    </div>
                `;
            }

            // Karan
            if (data.karan) {
                html += `
                    <div class="panchang-item">
                        <div class="panchang-label">करण</div>
                        <div class="panchang-value">${data.karan || 'N/A'}</div>
                    </div>
                `;
            }

            // Sunrise
            if (data.sunrise) {
                html += `
                    <div class="panchang-item">
                        <div class="panchang-label">सूर्योदय</div>
                        <div class="panchang-value">${data.sunrise || 'N/A'}</div>
                    </div>
                `;
            }

            // Sunset
            if (data.sunset) {
                html += `
                    <div class="panchang-item">
                        <div class="panchang-label">सूर्यास्त</div>
                        <div class="panchang-value">${data.sunset || 'N/A'}</div>
                    </div>
                `;
            }

            html += '</div>';
            container.innerHTML = html;
        }

        // Render calendar
        function renderCalendar() {
            const year = new Date().getFullYear();
            const month = new Date().getMonth();
            const bengaliMonthName = bengaliMonths[month];
            const bengaliYear = '१433';
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            let html = '';
            
            // Day headers
            bengaliDays.forEach(day => {
                html += `<div class="calendar-day-header">${day}</div>`;
            });

            // Empty cells
            for (let i = 0; i < firstDay; i++) {
                html += '<div></div>';
            }

            // Days
            const today = new Date();
            for (let day = 1; day <= daysInMonth; day++) {
                const isToday = day === today.getDate() && 
                               month === today.getMonth() && 
                               year === today.getFullYear();
                
                let classList = 'calendar-day';
                if (isToday) classList += ' today';

                html += `<div class="${classList}">${day}</div>`;
            }

            document.getElementById('calendarContainer').innerHTML = `
                <div style="margin-bottom: 12px; color: var(--text-secondary);">
                    ${bengaliMonthName} ${bengaliYear}
                </div>
                <div class="calendar-grid">${html}</div>
            `;
        }

        // Initialize
        async function init() {
            console.log('Initializing...');
            updateAPIStatus('📡 VedicAstroAPI কল করছি...', 'loading');
            
            // Display date and calendar
            displayTodayDate();
            renderCalendar();

            // Get panchang data
            await callVedicAstroAPI();
        }

        // Start when ready
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
